<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
        background-color: #f4f4f4;
    }
    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        display: inline-block;
    }
    h1 {
        color: red;
    }
    p {
        font-size: 18px;
        margin-top: 10px;
    }
    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: red;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }
    .btn:hover {
        background: darkred;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Payment Failed!</h1>
  <p>Unfortunately, your payment could not be processed. Please try again or contact support.</p>
  <a href="/retry-payment" class="btn">Retry Payment</a>
  <a href="/" class="btn" style="background: gray;">Go to Home</a>
</div>
</body>
</html>
